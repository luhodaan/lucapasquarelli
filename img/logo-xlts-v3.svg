<svg viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">

  <!-- ICONA: cerchio bianco (dominante) con sottile anello rosso come contorno -->
  <circle cx="60" cy="60" r="56" fill="#ffffff" stroke="#a1332a" stroke-width="3"/>

  <!-- furgone: corpo bianco a linea, dettagli rossi solo come accento -->
  <g fill="none" stroke="#a1332a" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- tettuccio a soffietto -->
    <path d="M35 46 L35 36 Q35 30 41 30 L79 30 Q85 30 85 36 L85 46" />
    <!-- corpo del furgone, riempimento bianco -->
    <rect x="24" y="46" width="72" height="28" rx="6" fill="#ffffff"/>
    <!-- sottile fascia rossa: solo una linea, non un blocco pieno -->
    <line x1="24" y1="60" x2="96" y2="60" stroke-width="2.5"/>
    <!-- finestrino -->
    <rect x="32" y="50" width="16" height="8" rx="1" fill="#ffffff"/>
  </g>

  <!-- ruote: bianche con solo il centro rosso -->
  <circle cx="38" cy="76" r="7" fill="#ffffff" stroke="#a1332a" stroke-width="2.5"/>
  <circle cx="82" cy="76" r="7" fill="#ffffff" stroke="#a1332a" stroke-width="2.5"/>
  <circle cx="38" cy="76" r="2.5" fill="#a1332a"/>
  <circle cx="82" cy="76" r="2.5" fill="#a1332a"/>

  <!-- WORDMARK: testo "xlts" rosso pieno, l'unico accento colorato forte accanto all'icona -->
  <text x="132" y="82"
        font-family="'EB Garamond', Georgia, serif"
        font-weight="600"
        font-size="64"
        fill="#a1332a">xlts</text>

</svg>
